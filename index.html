<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Image Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}

    body {
      background: linear-gradient(135deg,#1e1e2f,#3a3a6a);
      color:#fff;
      padding:20px;
    }

    h1 {
      text-align:center;
      margin-bottom:20px;
      font-weight:600;
    }

    .gallery {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap:20px;
    }

    .card {
      position:relative;
      overflow:hidden;
      border-radius:20px;
      cursor:pointer;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .card img {
      width:100%;
      height:100%;
      object-fit:cover;
      transition: transform 0.5s ease;
    }

    .card:hover img {
      transform: scale(1.1);
    }

    .overlay {
      position:absolute;
      bottom:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.5);
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      transition:0.4s;
    }

    .card:hover .overlay {
      opacity:1;
    }

    .overlay h3 {
      font-size:20px;
      text-align:center;
    }

    /* Lightbox */
    .lightbox {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
    }

    .lightbox img {
      max-width:90%;
      max-height:80%;
      border-radius:10px;
    }

    .lightbox.active {
      display:flex;
    }

    .close {
      position:absolute;
      top:20px;
      right:30px;
      font-size:30px;
      cursor:pointer;
    }

  </style>
</head>
<body>

  <h1>✨ Modern Image Gallery</h1>

  <div class="gallery">
    <div class="card">
      <img src="https://picsum.photos/id/1015/600/400">
      <div class="overlay"><h3>Nature 1</h3></div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/id/1016/600/400">
      <div class="overlay"><h3>Nature 2</h3></div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/id/1025/600/400">
      <div class="overlay"><h3>Dog</h3></div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/id/1035/600/400">
      <div class="overlay"><h3>Mountains</h3></div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img">
  </div>

  <script>
    const cards = document.querySelectorAll('.card img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    cards.forEach(img => {
      img.addEventListener('click', () => {
        lightbox.classList.add('active');
        lightboxImg.src = img.src;
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('active');
    }
  </script>

</body>
</html>
